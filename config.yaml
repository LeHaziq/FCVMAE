model:
  variant: base      # small | base | large
  in_channels: 3
  out_channels: 3
  norm: bn
  act: gelu
  decoder_depth: 2

data:
  # Raw VoxCeleb2 videos (mp4/mkv/...) used only for offline extraction.
  voxceleb2_raw_root: /path/to/VoxCeleb2/raw/dev

  # VoxCeleb2 pretraining path (extracted frames, not raw mp4).
  # Example: /datasets/VoxCeleb2/frames/dev/<id>/<video>/<track>/frame_XXXX.jpg
  voxceleb2_frame_root: /path/to/VoxCeleb2/frames/dev
  voxceleb2_speakers: []        # Optional speaker subset.
  voxceleb2_max_tracks: 0       # 0 means all tracks.
  voxceleb2_max_samples: 0      # 0 means all generated clip windows.

  # DISFA paths for AU fine-tuning.
  frame_root: /path/to/DISFA/frames
  label_root: /path/to/DISFA/ActionUnit_Labels

  # Optional subject filters; [] means all discovered subjects.
  pretrain_subjects: []
  finetune_subjects: []

  # Clip/grid defaults.
  clip_len: 16
  image_size: 112
  patch_size: [2, 4, 4]   # [t, h, w]
  clip_stride_pretrain: 4
  clip_stride_finetune: 2
  temporal_jitter: 2

  # AU label binarization threshold from DISFA intensities [0..5].
  label_threshold: 1.0

  # Clip-wise coherent augmentations.
  augment_pretrain: true
  augment_finetune: true
  hflip_prob: 0.5
  color_jitter: 0.2

pretrain:
  dataset: voxceleb2            # voxceleb2 | disfa
  epochs: 100
  batch_size: 4
  num_workers: 4
  lr: 0.0003
  weight_decay: 0.05
  amp: true
  mask_ratio_start: 0.95
  mask_ratio_end: 0.80
  tube_prob: 0.7
  log_interval: 10
  out_dir: outputs/pretrain

finetune:
  epochs: 30
  batch_size: 4
  num_workers: 4
  lr_encoder: 0.00005
  lr_head: 0.0005
  weight_decay: 0.01
  amp: true
  freeze_encoder_epochs: 5
  label_smoothing: 0.02

  # Example DISFA AU subset.
  au_list: [1, 2, 4, 6, 9, 12, 25, 26]
  # Placeholder class imbalance weights aligned with au_list.
  pos_weight: [4.0, 5.0, 3.5, 2.5, 4.2, 2.0, 3.8, 3.4]

  out_dir: outputs/finetune
